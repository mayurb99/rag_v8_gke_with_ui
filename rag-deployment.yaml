apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-deployment

spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag

  template:
    metadata:
      labels:
        app: rag

    spec:
      containers:
        - name: rag
          image: mayurbrijwani/rag-service:latest
          ports:
            - containerPort: 8001

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          env:
            - name: PINECONE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: PINECONE_API_KEY

            - name: HUGGINGFACEHUB_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: HUGGINGFACEHUB_API_TOKEN