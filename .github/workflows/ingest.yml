name: Ingest to Pinecone

on:
  push:
    branches:
      - "feature/**" 
    paths:
      - "docs/**"

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - name: Run Ingestion
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        run: python ingest.py